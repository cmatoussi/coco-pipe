data:
  path: PhysioNet_EEGBCI/BIDS
  type: bids
  # Run 03 is shared across the first 10 local subjects.
  task: motorimagery
  session: "01"
  runs:
    - "03"
  loading_mode: epochs
  # Fixed windows keep shapes aligned across subjects for this dataset copy.
  window_length: 2.0
  stride: 2.0
  subjects:
    - "001"
    - "002"
    - "003"
    - "004"
    - "005"
    - "006"
    - "007"
    - "008"
    - "009"
    - "010"

descriptors:
  input:
    require_sfreq: true
    require_channel_names: false
  output:
  precision: float32
  channel_pooling: all
  include_failure_summary: true
  include_runtime_meta: true
  families:
    bands:
      enabled: true
      psd_method: welch
      fmin: 1.0
      fmax: 45.0
      outputs:
        - absolute_power
        - relative_power
    parametric:
      enabled: true
      backend: specparam
      psd_method: welch
      freq_range: [1.0, 45.0]
      outputs:
        - aperiodic
        - fit_quality
        - peak_summary
    complexity:
      enabled: true
      backend: antropy
      measures:
        - sample_entropy
        - perm_entropy
        - spectral_entropy
        - hjorth_mobility
        - hjorth_complexity
  runtime:
    execution_backend: sequential
    n_jobs: 1
    chunking:
      obs_chunk: 64
      channel_chunk: full
      time_chunk: 2048
    on_error: collect

save_path: outputs/descriptors_eeg.npz
